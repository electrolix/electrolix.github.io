<!-- Back to Top Button -->
<a href="#" id="backToTop" aria-label="Back to Top">
    ↑
</a>

<style>
/* Your Back to Top CSS here */


  /*==========================================
        BACK TO TOP
==========================================*/

#backToTop{

    position:fixed;

    right:30px;

    bottom:30px;

    width:58px;

    height:58px;

    display:flex;

    align-items:center;

    justify-content:center;

    border-radius:50%;

    background:linear-gradient(135deg,#2563eb,#4f46e5);

    color:#fff;

    font-size:24px;

    font-weight:700;

    box-shadow:0 18px 40px rgba(37,99,235,.35);

    opacity:0;

    visibility:hidden;

    transform:translateY(20px);

    transition:.35s ease;

    z-index:999;

}

#backToTop:hover{

    transform:translateY(-6px);

    box-shadow:0 24px 50px rgba(37,99,235,.45);

}

#backToTop.show{

    opacity:1;

    visibility:visible;

    transform:translateY(0);

}

@media(max-width:768px){

#backToTop{

    width:50px;

    height:50px;

    right:20px;

    bottom:20px;

    font-size:20px;

}

}
</style>

<script>
const backToTop = document.getElementById("backToTop");

window.addEventListener("scroll", () => {

    if(window.scrollY > 400){

        backToTop.classList.add("show");

    }else{

        backToTop.classList.remove("show");

    }

});

backToTop.addEventListener("click", function(e){

    e.preventDefault();

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

});
</script>

</body>
</html>
